<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Legato</title>
    <!-- プレミアムなアイコンとPWA対応設定 -->
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgo=">
    <link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgo=">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // 手動およびシステム連動のクラスベースのダークモード
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF.js の導入 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Sometype+Mono:wght@400;500&display=swap');

        :root {
            --pure-white: #FFFFFF;
            --matte-black: #1A1A1A;
            --user-zoom: 1;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            overscroll-behavior: none; 
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .classic-gothic {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .timer-mono {
            font-family: 'Sometype Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

        .ui-element {
            transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.7s cubic-bezier(0.19, 1, 0.22, 1), background-color 0.3s, border-color 0.3s;
        }
        
        .immersive-active #app-header {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }
        
        .immersive-active #bottom-ui-container {
            transform: translateY(100%);
            opacity: 0;
            pointer-events: none;
        }
        
        .immersive-active #top-progress-container {
            transform: translateY(-100%);
            opacity: 0;
        }

        .immersive-active #zoom-control-panel {
            transform: translate(150%, -50%);
            opacity: 0;
            pointer-events: none;
        }

        #main-content {
            position: absolute;
            left: 0;
            right: 0;
            top: calc(env(safe-area-inset-top, 0px) + 60px);
            bottom: calc(env(safe-area-inset-bottom, 0px) + 100px);
            transition: top 0.7s cubic-bezier(0.19, 1, 0.22, 1), bottom 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 10;
            overflow: hidden;
            touch-action: none; 
        }
        
        body.mode-record #main-content {
            bottom: calc(env(safe-area-inset-bottom, 0px) + 325px);
        }
        
        body.immersive-active #main-content {
            top: env(safe-area-inset-top, 0px);
            bottom: env(safe-area-inset-bottom, 0px);
        }

        #score-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .page-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: transform 0.7s cubic-bezier(0.25, 1, 0.4, 1), opacity 0.7s cubic-bezier(0.25, 1, 0.4, 1), padding 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            will-change: transform, opacity;
        }
        
        @media (max-width: 640px) {
            .page-wrapper {
                padding: 0.75rem;
            }
        }
        
        body.immersive-active .page-wrapper {
            padding: 0; 
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .pedal-btn {
            position: relative;
            overflow: hidden;
            transition: background-color 0.2s, transform 0.1s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .pedal-btn:active {
            transform: scale(0.96);
        }
        .pedal-btn::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .pedal-btn:active::after {
            opacity: 1;
        }
        
        /* 楽譜用紙（A4アスペクト比）とダークモード制御 */
        .score-paper {
            aspect-ratio: 210 / 297;
            max-width: 100%;
            max-height: 100%;
            height: 2000px;
            width: 2000px;
            box-shadow: 0 12px 48px -10px rgba(0, 0, 0, 0.06), 0 2px 6px -2px rgba(0, 0, 0, 0.03);
            border-radius: 4px;
            border: 1px solid rgba(0, 0, 0, 0.03);
            background: var(--pure-white);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            box-sizing: border-box;
            transform-origin: center center;
            transform: scale(var(--user-zoom));
            transition: transform 0.2s ease-out, box-shadow 0.7s cubic-bezier(0.19, 1, 0.22, 1), background-color 0.3s;
            will-change: transform;
        }

        .dark .score-paper {
            background: #1C1C1E;
            border-color: rgba(255, 255, 255, 0.05);
            box-shadow: 0 12px 48px -10px rgba(0, 0, 0, 0.8), 0 2px 6px -2px rgba(0, 0, 0, 0.5);
        }

        .score-paper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; 
            transition: filter 0.3s ease;
        }

        /* スマートインバート（楽譜の反転） */
        body.invert-score .score-paper img {
            filter: invert(0.92) hue-rotate(180deg);
        }

        body.disable-animations .page-wrapper,
        body.disable-animations .score-paper {
            transition: none !important;
        }

        body.is-pinching .score-paper {
            transition: none !important;
        }

        #bottom-panel {
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .mode-play #bottom-panel {
            height: 90px;
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }
        .mode-record #bottom-panel {
            height: 310px;
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }
        
        .mode-play #record-extended-area {
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
        }
        .mode-record #record-extended-area {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        /* トグルスイッチ制御 */
        .toggle-checkbox:checked + div {
            background-color: var(--matte-black);
        }
        .dark .toggle-checkbox:checked + div {
            background-color: var(--pure-white);
        }
        .toggle-checkbox:checked + div > div {
            transform: translateX(100%);
        }
        .dark .toggle-checkbox:checked + div > div {
            background-color: #1A1A1A;
            border-color: #1A1A1A;
        }

        /* --- スプラッシュ画面用 SVG線画アニメーション --- */
        .splash-draw-1 {
            stroke-dasharray: 302;
            stroke-dashoffset: 302;
            animation: drawCircle 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .splash-draw-2 {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawPath 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
        }
        .splash-fade {
            opacity: 0;
            animation: fadeIn 0.8s ease-out 1.1s forwards;
        }
        .splash-text-anim {
            opacity: 0;
            transform: translateY(8px);
            animation: fadeInUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards;
        }
        
        @keyframes drawCircle {
            0% { stroke-dashoffset: 302; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes drawPath {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner-ring {
            border: 2px solid rgba(0, 0, 0, 0.05);
            animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
        }
        .dark .spinner-ring {
            border-color: rgba(255, 255, 255, 0.05);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        button, input {
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }
        
        #splash-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="mode-play text-stone-800 dark:text-stone-200 bg-[#FAF9F8] dark:bg-[#121212] transition-colors duration-300">

    <!-- トッププログレスバー -->
    <div id="top-progress-container" class="ui-element fixed top-0 left-0 w-full h-[3px] z-50 bg-stone-100 dark:bg-stone-800">
        <div id="progress-bar" class="h-full bg-stone-900 dark:bg-stone-200 w-0 transition-all duration-150 ease-linear"></div>
    </div>

    <!-- スプラッシュ画面 (洗練されたSVGアニメーション) -->
    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white dark:bg-[#121212] text-stone-900 dark:text-white transition-opacity duration-1000">
        <div class="flex flex-col items-center gap-6">
            <!-- カスタムSVGアイコン：タクトの軌跡とLegato(スラー)の象徴 -->
            <div class="relative w-20 h-20 flex items-center justify-center">
                <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- 外側の細い円 -->
                    <circle cx="50" cy="50" r="48" stroke="currentColor" stroke-width="1" class="splash-draw-1" transform="rotate(-90 50 50)"/>
                    <!-- Legatoを象徴する滑らかなスラー（曲線） -->
                    <path d="M 25 50 C 40 20, 60 80, 75 50" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" class="splash-draw-2"/>
                    <!-- アクセントのドット -->
                    <circle cx="75" cy="50" r="2.5" fill="currentColor" class="splash-fade" />
                </svg>
            </div>
            <!-- アプリロゴ -->
            <div class="text-center splash-text-anim">
                <h1 class="classic-gothic text-2xl tracking-[0.3em] pl-[0.3em] font-light">LEGATO</h1>
                <p class="text-[9px] text-stone-400 font-bold tracking-[0.2em] uppercase mt-2">Auto Score Turner</p>
            </div>
        </div>
    </div>

    <!-- 処理中のスピナーオーバーレイ -->
    <div id="loading-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white/80 dark:bg-[#121212]/80 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="flex flex-col items-center gap-4">
            <div class="w-10 h-10 rounded-full spinner-ring border-t-stone-900 dark:border-t-stone-100"></div>
            <p id="loading-text" class="text-[10px] font-bold text-stone-500 dark:text-stone-400 tracking-[0.1em] uppercase">楽譜データを構築中...</p>
        </div>
    </div>

    <!-- アプリ全体コンテナ -->
    <div class="relative w-full h-full z-0 overflow-hidden">
        
        <!-- ヘッダー -->
        <header id="app-header" class="ui-element absolute top-0 w-full z-40 bg-white dark:bg-[#1C1C1E] border-b border-stone-100 dark:border-stone-800 pt-[env(safe-area-inset-top,0px)]">
            <div class="flex items-center justify-between px-6 py-3.5 mt-1">
                
                <!-- 曲選択ボタン -->
                <div class="flex items-center gap-2 cursor-pointer py-1 px-2 -ml-2 rounded-lg hover:bg-stone-50 dark:hover:bg-stone-800 active:scale-95 transition-all" id="btn-open-modal">
                    <i data-lucide="music-2" class="w-4 h-4 text-stone-800 dark:text-stone-200 shrink-0"></i>
                    <h1 id="header-title" class="classic-gothic text-sm text-stone-900 dark:text-white truncate max-w-[160px] sm:max-w-[280px]">Legato</h1>
                    <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-stone-400 dark:text-stone-500 shrink-0"></i>
                </div>
                
                <div class="flex items-center gap-3">
                    <!-- モード切替トグル -->
                    <div class="bg-stone-100 dark:bg-stone-800 p-0.5 rounded-lg flex relative overflow-hidden">
                        <div id="mode-indicator" class="absolute w-1/2 h-[calc(100%-4px)] top-0.5 left-0.5 bg-white dark:bg-stone-600 rounded shadow-[0_1px_3px_rgba(0,0,0,0.04)] transition-transform duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)]"></div>
                        <button id="btn-mode-play" class="relative z-10 px-4 py-1.5 text-[10px] font-bold rounded w-16 text-stone-900 dark:text-white transition-colors">演奏</button>
                        <button id="btn-mode-record" class="relative z-10 px-4 py-1.5 text-[10px] font-bold rounded w-16 text-stone-400 dark:text-stone-400 transition-colors">記録</button>
                    </div>
                    
                    <!-- 設定ボタン -->
                    <button id="btn-open-settings" class="p-1.5 text-stone-400 hover:text-stone-900 hover:bg-stone-50 dark:hover:text-white dark:hover:bg-stone-800 rounded-lg transition-all active:scale-95 ml-1">
                        <i data-lucide="settings" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- メイン楽譜エリア -->
        <main id="main-content">
            <div id="score-container">
                <!-- JSでページラッパーが絶対配置で挿入されます -->
            </div>
        </main>

        <!-- ズームパネル -->
        <div id="zoom-control-panel" class="ui-element fixed right-4 top-1/2 -translate-y-1/2 z-40 flex flex-col items-center bg-white/95 dark:bg-[#1C1C1E]/95 backdrop-blur-sm border border-stone-100 dark:border-stone-800 shadow-[0_8px_32px_rgba(0,0,0,0.08)] rounded-full py-3 px-1.5 gap-4">
            <button id="btn-zoom-in" class="p-2 text-stone-500 dark:text-stone-400 hover:text-stone-900 hover:bg-stone-100 dark:hover:text-white dark:hover:bg-stone-800 rounded-full transition-all active:scale-90">
                <i data-lucide="plus" class="w-4 h-4"></i>
            </button>
            <div id="zoom-display" class="text-[10px] font-bold text-stone-900 dark:text-stone-100 tracking-wider cursor-pointer active:scale-95 transition-transform" title="タップで100%にリセット">100%</div>
            <button id="btn-zoom-out" class="p-2 text-stone-500 dark:text-stone-400 hover:text-stone-900 hover:bg-stone-100 dark:hover:text-white dark:hover:bg-stone-800 rounded-full transition-all active:scale-90">
                <i data-lucide="minus" class="w-4 h-4"></i>
            </button>
        </div>

        <!-- 下部UIコンテナ -->
        <div id="bottom-ui-container" class="ui-element absolute bottom-0 w-full z-30 flex flex-col justify-end pointer-events-none">
            
            <!-- ページネーション -->
            <div id="pagination-area" class="w-full px-4 pb-2.5 pointer-events-auto">
                <div id="pagination-list" class="flex gap-2 overflow-x-auto no-scrollbar py-1 px-1 snap-x justify-center scroll-smooth">
                    <!-- JSで動的にボタンが挿入されます -->
                </div>
            </div>

            <!-- 下部コントロールパネル -->
            <div id="bottom-panel" class="w-full bg-white dark:bg-[#1C1C1E] border-t border-stone-100 dark:border-stone-800 shadow-[0_-4px_24px_rgba(0,0,0,0.02)] flex flex-col pointer-events-auto">
                
                <!-- 基本コントロール -->
                <div class="flex items-center justify-between px-8 py-4 h-[80px] shrink-0">
                    <button id="btn-reset" class="w-10 h-10 flex items-center justify-center rounded-lg border border-stone-200/60 dark:border-stone-700 text-stone-600 dark:text-stone-400 hover:bg-stone-50 dark:hover:bg-stone-800 hover:text-stone-900 dark:hover:text-white transition-all active:scale-95 shadow-[0_1px_2px_rgba(0,0,0,0.01)]">
                        <i data-lucide="square" class="w-3.5 h-3.5 fill-current"></i>
                    </button>

                    <div class="flex flex-col items-center mt-1">
                        <div id="timer-display" class="timer-mono text-2xl font-bold tracking-wide text-stone-900 dark:text-white">
                            00:00<span class="text-base text-stone-400 dark:text-stone-500 font-medium ml-0.5">.0</span>
                        </div>
                        <div id="mode-label" class="text-[9px] font-bold tracking-[0.1em] text-stone-400 dark:text-stone-500 mt-0.5">
                            演奏モード
                        </div>
                    </div>

                    <!-- 再生ボタン -->
                    <button id="btn-play" class="w-11 h-11 flex items-center justify-center rounded-lg bg-stone-950 dark:bg-stone-200 text-white dark:text-stone-900 shadow-sm hover:bg-stone-800 transition-all active:scale-95">
                        <i data-lucide="play" id="icon-play" class="w-4 h-4 ml-0.5 fill-current"></i>
                        <i data-lucide="pause" id="icon-pause" class="w-4 h-4 hidden fill-current"></i>
                    </button>
                </div>

                <!-- 拡張エリア (記録モード時) -->
                <div id="record-extended-area" class="flex-1 px-8 pb-5 flex gap-5 overflow-hidden transition-all duration-500">
                    
                    <div class="flex-1 bg-stone-50 dark:bg-[#121212] border border-stone-100 dark:border-stone-800 rounded-xl p-3.5 overflow-y-auto no-scrollbar flex flex-col">
                        <h3 class="text-[9px] font-bold text-stone-400 dark:text-stone-500 tracking-[0.1em] mb-2 px-1">タイムライン</h3>
                        <ul id="timestamp-list" class="flex flex-col gap-1">
                            <!-- JSでリスト生成 -->
                        </ul>
                    </div>

                    <button id="btn-stamp" class="pedal-btn border-none w-40 h-full max-h-[150px] bg-stone-950 dark:bg-stone-800 text-white dark:text-white rounded-xl shadow-sm flex flex-col items-center justify-center disabled:opacity-20 disabled:pointer-events-none">
                        <i data-lucide="chevron-up" class="w-6 h-6 opacity-30 mb-0.5 transition-transform duration-200 text-white" id="stamp-icon"></i>
                        <span class="classic-gothic text-sm tracking-[0.1em] font-bold text-white">記録</span>
                        <span class="text-[9px] text-stone-400 font-bold mt-1">タップして次へ</span>
                    </button>
                    
                </div>
            </div>
        </div>
    </div>

    <!-- 曲管理モーダル -->
    <div id="score-modal" class="absolute inset-0 z-50 flex items-center justify-center p-4 bg-stone-900/10 dark:bg-black/50 backdrop-blur-[2px] opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white dark:bg-[#1C1C1E] w-full max-w-md rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.08)] border border-stone-100 dark:border-stone-800 overflow-hidden flex flex-col max-h-[85vh]">
            <div class="p-5 border-b border-stone-100 dark:border-stone-800 flex justify-between items-center bg-stone-50/50 dark:bg-[#121212]/50">
                <h2 class="classic-gothic text-xs tracking-[0.1em] text-stone-800 dark:text-stone-200 flex items-center gap-2">
                    <i data-lucide="library" class="w-3.5 h-3.5 text-stone-900 dark:text-stone-100"></i>
                    ライブラリ
                </h2>
                <button id="btn-close-modal" class="p-1.5 hover:bg-stone-100 dark:hover:bg-stone-800 rounded-md text-stone-500 active:scale-95 transition-all">
                    <i data-lucide="x" class="w-3.5 h-3.5"></i>
                </button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-1 no-scrollbar bg-white dark:bg-[#1C1C1E]" id="modal-score-list">
                <!-- JSでリスト生成 -->
            </div>
            
            <div class="p-4 bg-stone-50/50 dark:bg-[#121212]/50 border-t border-stone-100 dark:border-stone-800 flex flex-col gap-2">
                <label class="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-stone-950 dark:bg-stone-200 text-white dark:text-stone-900 rounded-lg font-bold cursor-pointer shadow-sm hover:bg-stone-800 dark:hover:bg-white active:scale-95 transition-all text-xs">
                    <i data-lucide="plus-square" class="w-3.5 h-3.5"></i>
                    楽譜（PDF・画像）を読み込む
                    <input type="file" id="modal-file-input" accept="image/*,.pdf" multiple class="hidden">
                </label>
                
                <div class="flex gap-2">
                    <button id="btn-export-json" class="flex-1 flex items-center justify-center gap-1.5 py-2 px-3 bg-white dark:bg-[#2C2C2E] border border-stone-200 dark:border-stone-700 text-stone-700 dark:text-stone-300 rounded-lg font-bold active:scale-95 transition-all text-[10px] hover:bg-stone-50 dark:hover:bg-stone-700">
                        <i data-lucide="download" class="w-3 h-3 text-stone-500"></i> JSON保存
                    </button>
                    <label class="flex-1 flex items-center justify-center gap-1.5 py-2 px-3 bg-white dark:bg-[#2C2C2E] border border-stone-200 dark:border-stone-700 text-stone-700 dark:text-stone-300 rounded-lg font-bold cursor-pointer active:scale-95 transition-all text-[10px] hover:bg-stone-50 dark:hover:bg-stone-700">
                        <i data-lucide="upload" class="w-3 h-3 text-stone-500"></i> JSON読込
                        <input type="file" id="import-json-input" accept=".json" class="hidden">
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="absolute inset-0 z-50 flex items-center justify-center p-4 bg-stone-900/10 dark:bg-black/50 backdrop-blur-[2px] opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white dark:bg-[#1C1C1E] w-full max-w-sm rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.08)] border border-stone-100 dark:border-stone-800 overflow-hidden flex flex-col max-h-[85vh]">
            <div class="p-5 border-b border-stone-100 dark:border-stone-800 flex justify-between items-center bg-stone-50/50 dark:bg-[#121212]/50">
                <h2 class="classic-gothic text-xs tracking-[0.1em] text-stone-800 dark:text-stone-200 flex items-center gap-2">

    <!-- アプリケーションロジック -->
    <script>
        function renderIcons() {
            lucide.createIcons({
                attrs: { 'stroke-width': 1.5 }
            });
        }

        // --- PDF.jsの設定 ---
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        const CMAP_URL = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/';
        const CMAP_PACKED = true;

        // --- IndexedDB システム ---
        const DB_NAME = 'LegatoScoresDB';
        const STORE_NAME = 'scoresStore';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveScoreToDB(score) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.put(score);
                request.onsuccess = () => resolve();
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function deleteScoreFromDB(id) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function getAllScoresFromDB() {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        // --- 状態管理 (State) ---
        const state = {
            mode: 'play',
            isPlaying: false,
            currentTime: 0,
            lastFrameTime: 0,
            animationFrameId: null,
            currentPage: 0,
            currentActiveEventIndex: 0, 
            scores: [], 
            currentScoreId: null, 
            immersiveTimeout: null,
            isImmersive: false,
            zoomScale: 1.0,
            settings: {
                wakeLock: true,
                immersiveTimer: 1500, // 1.5秒をデフォルトに設定
                animations: true,
                theme: 'light',       // 'light' をデフォルトに設定
                invertScore: true
            }
        };

        let wakeLockSentinel = null;

        const ZOOM_STEP = 0.1;
        const ZOOM_MAX = 3.0;
        const ZOOM_MIN = 1.0;

        function getCurrentScore() {
            return state.scores.find(s => s.id === state.currentScoreId);
        }

        // --- DOM要素の取得 ---
        const dom = {
            body: document.body,
            headerTitle: document.getElementById('header-title'),
            mainContent: document.getElementById('main-content'),
            scoreContainer: document.getElementById('score-container'),
            paginationList: document.getElementById('pagination-list'),
            timerDisplay: document.getElementById('timer-display'),
            modeLabel: document.getElementById('mode-label'),
            btnPlay: document.getElementById('btn-play'),
            iconPlay: document.getElementById('icon-play'),
            iconPause: document.getElementById('icon-pause'),
            btnReset: document.getElementById('btn-reset'),
            btnModePlay: document.getElementById('btn-mode-play'),
            btnModeRecord: document.getElementById('btn-mode-record'),
            modeIndicator: document.getElementById('mode-indicator'),
            btnStamp: document.getElementById('btn-stamp'),
            stampIcon: document.getElementById('stamp-icon'),
            timestampList: document.getElementById('timestamp-list'),
            progressBar: document.getElementById('progress-bar'),
            
            btnZoomIn: document.getElementById('btn-zoom-in'),
            btnZoomOut: document.getElementById('btn-zoom-out'),
            zoomDisplay: document.getElementById('zoom-display'),
            
            btnOpenModal: document.getElementById('btn-open-modal'),
            scoreModal: document.getElementById('score-modal'),
            btnCloseModal: document.getElementById('btn-close-modal'),
            modalScoreList: document.getElementById('modal-score-list'),
            modalFileInput: document.getElementById('modal-file-input'),
            btnExportJson: document.getElementById('btn-export-json'),
            importJsonInput: document.getElementById('import-json-input'),

            btnOpenSettings: document.getElementById('btn-open-settings'),
            settingsModal: document.getElementById('settings-modal'),
            btnCloseSettings: document.getElementById('btn-close-settings'),
            settingWakelock: document.getElementById('setting-wakelock'),
            settingAnimation: document.getElementById('setting-animation'),
            settingInvert: document.getElementById('setting-invert'),
            settingTimerBtns: document.querySelectorAll('.setting-timer-btn'),
            settingThemeBtns: document.querySelectorAll('.setting-theme-btn'),

            toast: document.getElementById('custom-toast'),
            confirmModal: document.getElementById('custom-confirm-modal'),
            confirmTitle: document.getElementById('confirm-title'),
            confirmMsg: document.getElementById('confirm-msg'),
            btnConfirmCancel: document.getElementById('btn-confirm-cancel'),
            btnConfirmOk: document.getElementById('btn-confirm-ok'),

            promptModal: document.getElementById('custom-prompt-modal'),
            promptTitle: document.getElementById('prompt-title'),
            promptInput: document.getElementById('prompt-input'),
            btnPromptCancel: document.getElementById('btn-prompt-cancel'),
            btnPromptSave: document.getElementById('btn-prompt-save'),

            loadingOverlay: document.getElementById('loading-overlay'),
            loadingText: document.getElementById('loading-text')
        };

        // --- カスタムポップアップヘルパー ---
        let toastTimeout = null;
        function showToast(message) {
            clearTimeout(toastTimeout);
            dom.toast.textContent = message;
            dom.toast.classList.remove('opacity-0', 'pointer-events-none');
            dom.toast.classList.add('opacity-100');
            toastTimeout = setTimeout(() => {
                dom.toast.classList.remove('opacity-100');
                dom.toast.classList.add('opacity-0', 'pointer-events-none');
            }, 2500);
        }

        let confirmCallback = null;
        function showConfirm(title, message, onOk) {
            dom.confirmTitle.textContent = title;
            dom.confirmMsg.textContent = message;
            confirmCallback = onOk;
            dom.confirmModal.classList.remove('opacity-0', 'pointer-events-none');
        }

        dom.btnConfirmCancel.onclick = () => {
            dom.confirmModal.classList.add('opacity-0', 'pointer-events-none');
            confirmCallback = null;
        };

        dom.btnConfirmOk.onclick = () => {
            if (confirmCallback) confirmCallback();
            dom.confirmModal.classList.add('opacity-0', 'pointer-events-none');
            confirmCallback = null;
        };

        let promptCallback = null;
        function showPrompt(title, defaultValue, onSave) {
            dom.promptTitle.textContent = title;
            dom.promptInput.value = defaultValue;
            promptCallback = onSave;
            dom.promptModal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                dom.promptInput.focus();
                dom.promptInput.select();
            }, 100);
        }

        dom.btnPromptCancel.onclick = () => {
            dom.promptModal.classList.add('opacity-0', 'pointer-events-none');
            promptCallback = null;
        };

        dom.btnPromptSave.onclick = () => {
            const val = dom.promptInput.value.trim();
            if (val && promptCallback) {
                promptCallback(val);
            }
            dom.promptModal.classList.add('opacity-0', 'pointer-events-none');
            promptCallback = null;
        };

        dom.promptInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') dom.btnPromptSave.click();
        });

        function showLoading(show, text = "楽譜データを構築中...") {
            dom.loadingText.textContent = text;
            if (show) {
                dom.loadingOverlay.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                dom.loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        // --- Wake Lock API ---
        async function requestWakeLock() {
            if (!state.settings.wakeLock) {
                releaseWakeLock();
                return;
            }
            try {
                if ('wakeLock' in navigator && wakeLockSentinel === null) {
                    wakeLockSentinel = await navigator.wakeLock.request('screen');
                    wakeLockSentinel.addEventListener('release', () => {
                        wakeLockSentinel = null;
                    });
                }
            } catch (err) {
                console.log(`Wake Lock error: ${err.message}`);
            }
        }

        function releaseWakeLock() {
            if (wakeLockSentinel !== null) {
                wakeLockSentinel.release().then(() => {
                    wakeLockSentinel = null;
                });
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLockSentinel !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        // --- テーマ（ダークモード）管理 ---
        function applyTheme() {
            const isDark = state.settings.theme === 'dark' || 
                           (state.settings.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            
            if (isDark && state.settings.invertScore) {
                dom.body.classList.add('invert-score');
            } else {
                dom.body.classList.remove('invert-score');
            }
            applyModeUI();
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (state.settings.theme === 'system') {
                applyTheme();
            }
        });

        // --- ダミーデータ生成 ---
        function createDummySVG(pageNum) {
            const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1120" style="background-color:#fff; width: 100%; height: 100%;">
                <rect width="100%" height="100%" fill="#ffffff"/>
                <text x="400" y="80" font-family="'Inter', 'Noto Sans JP', sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#2c2a29">デモ楽譜 - ${pageNum + 1}</text>
                
                <g stroke="#2c2a29" stroke-width="1.2" opacity="0.85">
                    <g transform="translate(50, 150)"><line x1="0" y1="0" x2="700" y2="0"/><line x1="0" y1="15" x2="700" y2="15"/><line x1="0" y1="30" x2="700" y2="30"/><line x1="0" y1="45" x2="700" y2="45"/><line x1="0" y1="60" x2="700" y2="60"/><circle cx="150" cy="30" r="7" fill="#2c2a29"/><path d="M157 30 V-10" fill="none"/><circle cx="250" cy="45" r="7" fill="#2c2a29"/><path d="M257 45 V5" fill="none"/><circle cx="350" cy="15" r="7" fill="#2c2a29"/><path d="M357 15 V-25" fill="none"/><rect x="0" y="0" width="3" height="60" fill="#2c2a29"/><rect x="697" y="0" width="3" height="60" fill="#2c2a29"/></g>
                    <g transform="translate(50, 350)"><line x1="0" y1="0" x2="700" y2="0"/><line x1="0" y1="15" x2="700" y2="15"/><line x1="0" y1="30" x2="700" y2="30"/><line x1="0" y1="45" x2="700" y2="45"/><line x1="0" y1="60" x2="700" y2="60"/><circle cx="200" cy="60" r="7" fill="#2c2a29"/><path d="M207 60 V20" fill="none"/><circle cx="400" cy="30" r="7" fill="#2c2a29"/><path d="M407 30 V-10" fill="none"/><rect x="0" y="0" width="3" height="60" fill="#2c2a29"/><rect x="697" y="0" width="3" height="60" fill="#2c2a29"/></g>
                    <g transform="translate(50, 550)"><line x1="0" y1="0" x2="700" y2="0"/><line x1="0" y1="15" x2="700" y2="15"/><line x1="0" y1="30" x2="700" y2="30"/><line x1="0" y1="45" x2="700" y2="45"/><line x1="0" y1="60" x2="700" y2="60"/><rect x="0" y="0" width="3" height="60" fill="#2c2a29"/><rect x="697" y="0" width="3" height="60" fill="#2c2a29"/></g>
                    <g transform="translate(50, 750)"><line x1="0" y1="0" x2="700" y2="0"/><line x1="0" y1="15" x2="700" y2="15"/><line x1="0" y1="30" x2="700" y2="30"/><line x1="0" y1="45" x2="700" y2="45"/><line x1="0" y1="60" x2="700" y2="60"/><rect x="0" y="0" width="3" height="60" fill="#2c2a29"/><rect x="697" y="0" width="3" height="60" fill="#2c2a29"/></g>
                </g>
                <text x="750" y="1080" font-family="'Inter', sans-serif" font-size="14" text-anchor="end" fill="#7a7572">${pageNum + 1}</text>
            </svg>`;
            return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
        }

        // --- データの初期化 ---
        async function loadData() {
            try {
                const dbScores = await getAllScoresFromDB();
                state.scores = dbScores || [];
                
                const savedMeta = localStorage.getItem('LegatoMeta');
                if (savedMeta) {
                    const parsed = JSON.parse(savedMeta);
                    state.currentScoreId = parsed.currentScoreId;
                    state.mode = parsed.mode || 'play';
                    state.zoomScale = parsed.zoomScale || 1.0;
                    if (parsed.settings) {
                        state.settings = { ...state.settings, ...parsed.settings };
                    }
                }
            } catch (e) {
                console.error("IndexedDB Load Error:", e);
            }

            if (state.scores.length === 0) {
                const defaultScore = {
                    id: 'score_' + Date.now(),
                    title: 'クラシック曲 (デモ)',
                    pages: [createDummySVG(0), createDummySVG(1), createDummySVG(2)],
                    timeline: [{ time: 0, page: 0 }]
                };
                state.scores = [defaultScore];
                state.currentScoreId = defaultScore.id;
                state.mode = 'play';
                await saveScoreToDB(defaultScore);
            }

            if (!getCurrentScore()) {
                state.currentScoreId = state.scores[0].id;
            }

            saveAppState();
            applyTheme();
            applyZoom();
            updateSettingsUI();
            loadCurrentScoreToUI();
            
            if(state.settings.wakeLock) {
                requestWakeLock();
            }
        }

        function saveAppState() {
            try {
                const meta = {
                    currentScoreId: state.currentScoreId,
                    mode: state.mode,
                    zoomScale: state.zoomScale,
                    settings: state.settings
                };
                localStorage.setItem('LegatoMeta', JSON.stringify(meta));
            } catch (e) {
                console.error("Meta Save Error:", e);
            }
        }

        function loadCurrentScoreToUI() {
            const score = getCurrentScore();
            if (!score) return;

            if (state.isPlaying) togglePlay(); 
            state.currentTime = 0;
            state.currentPage = score.timeline.length > 0 ? score.timeline[0].page : 0;
            state.currentActiveEventIndex = 0;
            
            dom.headerTitle.textContent = score.title;
            
            applyModeUI();
            renderScorePages();
            renderPagination();
            renderTimestampList();
            updateScorePosition();
            updateTimerDisplay();
            updateProgressBar();
        }

        // --- 設定 (Settings) のUI管理 ---
        function openSettings() {
            updateSettingsUI();
            dom.settingsModal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeSettings() {
            dom.settingsModal.classList.add('opacity-0', 'pointer-events-none');
            saveAppState();
        }

        function updateSettingsUI() {
            dom.settingWakelock.checked = state.settings.wakeLock;
            dom.settingAnimation.checked = state.settings.animations;
            dom.settingInvert.checked = state.settings.invertScore;
            
            dom.settingTimerBtns.forEach(btn => {
                if (parseInt(btn.dataset.time) === state.settings.immersiveTimer) {
                    btn.className = 'setting-timer-btn flex-1 py-2 rounded-lg border text-[10px] font-bold transition-all bg-stone-900 text-white border-stone-900 dark:bg-stone-200 dark:text-stone-900 dark:border-stone-200';
                } else {
                    btn.className = 'setting-timer-btn flex-1 py-2 rounded-lg border text-[10px] font-bold transition-all bg-white text-stone-500 border-stone-200 hover:bg-stone-50 dark:bg-[#1C1C1E] dark:text-stone-400 dark:border-stone-700 dark:hover:bg-stone-800';
                }
            });

            dom.settingThemeBtns.forEach(btn => {
                if (btn.dataset.theme === state.settings.theme) {
                    btn.className = 'setting-theme-btn flex-1 py-1.5 rounded-md text-[10px] font-bold transition-all bg-white text-stone-900 shadow-sm dark:bg-stone-600 dark:text-white';
                } else {
                    btn.className = 'setting-theme-btn flex-1 py-1.5 rounded-md text-[10px] font-bold transition-all text-stone-500 hover:bg-white/50 dark:text-stone-400 dark:hover:bg-stone-700';
                }

                dom.body.classList.remove('disable-animations');
            } else {
                dom.body.classList.add('disable-animations');
            }

        dom.settingThemeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                state.settings.theme = e.target.dataset.theme;
                applyTheme();
                updateSettingsUI();
                saveAppState();
            });
        });

        dom.settingInvert.addEventListener('change', (e) => {
            state.settings.invertScore = e.target.checked;
            applyTheme();
            saveAppState();
        });

        dom.settingWakelock.addEventListener('change', (e) => {
            state.settings.wakeLock = e.target.checked;
            if (state.settings.wakeLock) {
                requestWakeLock();
            } else {
                releaseWakeLock();
            }
            saveAppState();
        });

        dom.settingAnimation.addEventListener('change', (e) => {
            state.settings.animations = e.target.checked;
            updateSettingsUI();
            saveAppState();
        });

        dom.settingTimerBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                state.settings.immersiveTimer = parseInt(e.target.dataset.time);
                updateSettingsUI();
                saveAppState();
                resetImmersiveTimer();
            });
        });

        // --- 中心拡大固定ズーム ---
        function applyZoom() {
            document.documentElement.style.setProperty('--user-zoom', state.zoomScale);
            dom.zoomDisplay.textContent = Math.round(state.zoomScale * 100) + '%';
            saveAppState();
        }

        dom.btnZoomIn.addEventListener('click', () => {
            state.zoomScale = Math.min(state.zoomScale + ZOOM_STEP, ZOOM_MAX);
            applyZoom();
        });

        dom.btnZoomOut.addEventListener('click', () => {
            state.zoomScale = Math.max(state.zoomScale - ZOOM_STEP, ZOOM_MIN);
            applyZoom();
        });

        dom.zoomDisplay.addEventListener('click', () => {
            state.zoomScale = 1.0;
            applyZoom();
            showToast("拡大率をリセットしました");
        });

        // --- UIレンダリング ---
        function renderScorePages() {
            const score = getCurrentScore();
            if (!score) return;

            dom.scoreContainer.innerHTML = '';

            score.pages.forEach((src, index) => {
                const pageWrapper = document.createElement('div');
                pageWrapper.className = 'page-wrapper';
                
                const paper = document.createElement('div');
                paper.className = 'score-paper';
                
                const img = document.createElement('img');
                img.src = src;
                img.className = 'w-full h-full object-contain';
                img.draggable = false;
                
                paper.appendChild(img);
                pageWrapper.appendChild(paper);
                dom.scoreContainer.appendChild(pageWrapper);
            });
        }

        function renderPagination() {
            const score = getCurrentScore();
            if (!score) return;

            dom.paginationList.innerHTML = '';
            score.pages.forEach((_, index) => {
                const btn = document.createElement('button');
                btn.className = `px-4 h-9 rounded-md flex items-center justify-center text-xs font-bold tracking-wider transition-all shrink-0 snap-center border ${
                    index === state.currentPage 
                        ? 'bg-stone-900 text-white border-stone-950 scale-105 shadow-sm dark:bg-stone-200 dark:text-stone-900 dark:border-stone-300' 
                        : 'bg-white text-stone-600 border-stone-200/80 hover:bg-stone-50 dark:bg-[#1C1C1E] dark:text-stone-400 dark:border-stone-800 dark:hover:bg-stone-800'
                }`;
                btn.textContent = index + 1; 
                btn.onclick = () => handlePageChange(index);
                dom.paginationList.appendChild(btn);
                
                if (index === state.currentPage) {
                    setTimeout(() => {
                        btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                    }, 50);
                }
            });
        }

        function renderTimestampList() {
            const score = getCurrentScore();
            if (!score || !score.timeline) return;

            dom.timestampList.innerHTML = '';
            
            let activeIndex = 0;
            for (let i = 0; i < score.timeline.length; i++) {
                if (state.currentTime >= score.timeline[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }
            state.currentActiveEventIndex = activeIndex;

            score.timeline.forEach((event, index) => {
                const isActive = index === activeIndex;
                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-2.5 rounded-lg text-xs transition-colors border cursor-pointer ${
                    isActive ? 'bg-stone-100/80 border-stone-300 shadow-sm dark:bg-stone-800 dark:border-stone-600' : 'bg-transparent border-transparent hover:bg-stone-50 dark:hover:bg-stone-800'
                }`;
                
                li.onclick = () => {
                    if (state.isPlaying) togglePlay();
                    state.currentTime = event.time;
                    updateTimerDisplay();
                    checkAutoTurn(); 
                };
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'flex items-center gap-3 w-full';
                
                const pageInfo = document.createElement('span');
                pageInfo.className = `font-bold w-12 text-center ${isActive ? 'text-stone-900 dark:text-white' : 'text-stone-500 dark:text-stone-400'}`;
                pageInfo.textContent = event.page + 1; 
                
                const timeInfo = document.createElement('span');
                timeInfo.className = `timer-mono font-medium flex-1 ${isActive ? 'text-stone-900 dark:text-white' : 'text-stone-600 dark:text-stone-400'}`;
                timeInfo.textContent = formatTime(event.time);
                
                infoDiv.appendChild(pageInfo);
                infoDiv.appendChild(timeInfo);
                li.appendChild(infoDiv);

                if (index > 0) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'p-1.5 text-stone-400 hover:text-red-500 hover:bg-stone-200 dark:hover:bg-stone-700 rounded transition-all';
                    delBtn.innerHTML = '<i data-lucide="x" class="w-3.5 h-3.5"></i>';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        score.timeline.splice(index, 1);
                        saveScoreToDB(score).then(() => checkAutoTurn());
                    };
                    li.appendChild(delBtn);
                } else {
                    const dummy = document.createElement('div');
                    dummy.className = 'w-6 h-6';
                    li.appendChild(dummy);
                }

                dom.timestampList.appendChild(li);
            });
            
            renderIcons();
            
            if (state.mode === 'record') {
                dom.btnStamp.disabled = !state.isPlaying;
            }
        }

        // 奥行きを感じさせるクロスフェード・スケールアニメーション
        function updateScorePosition() {
            const score = getCurrentScore();
            if (!score) return;
            Array.from(dom.scoreContainer.children).forEach((pageWrapper, index) => {
                const offset = index - state.currentPage;
                if (offset === 0) {
                    pageWrapper.style.transform = `translateX(0) scale(1)`;
                    pageWrapper.style.opacity = '1';
                    pageWrapper.style.zIndex = '5';
                } else {
                    pageWrapper.style.transform = `translateX(${offset * 100}%) scale(0.92)`;
                    pageWrapper.style.opacity = '0.3';
                    pageWrapper.style.zIndex = '1';
                }
            });
        }

        function formatTime(ms) {
            const totalSec = Math.floor(ms / 1000);
            const m = Math.floor(totalSec / 60).toString().padStart(2, '0');
            const s = (totalSec % 60).toString().padStart(2, '0');
            const dec = Math.floor((ms % 1000) / 100).toString();
            return `${m}:${s}.${dec}`;
        }

        function updateTimerDisplay() {
            const totalSec = Math.floor(state.currentTime / 1000);
            const m = Math.floor(totalSec / 60).toString().padStart(2, '0');
            const s = (totalSec % 60).toString().padStart(2, '0');
            const dec = Math.floor((state.currentTime % 1000) / 100).toString();
            dom.timerDisplay.innerHTML = `${m}:${s}<span class="text-base text-stone-400 dark:text-stone-500 font-medium ml-0.5">.${dec}</span>`;
        }

        function updateProgressBar() {
            const score = getCurrentScore();
            if (!score || !score.timeline || score.timeline.length <= 1) {
                dom.progressBar.style.width = '0%';
                return;
            }
            const lastEventTime = score.timeline[score.timeline.length - 1].time;
            if (lastEventTime === 0) return;
            
            let progress = (state.currentTime / lastEventTime) * 100;
            if (progress > 100) progress = 100;
            dom.progressBar.style.width = `${progress}%`;
        }

        // --- 曲管理モーダルUI ---
        function openModal() {
            renderScoreModalList();
            dom.scoreModal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeModal() {
            dom.scoreModal.classList.add('opacity-0', 'pointer-events-none');
        }

        function renderScoreModalList() {
            dom.modalScoreList.innerHTML = '';
            state.scores.forEach(score => {
                const isCurrent = score.id === state.currentScoreId;
                const item = document.createElement('div');
                item.className = `flex items-center justify-between p-3.5 mb-2.5 rounded-xl border transition-all ${
                    isCurrent ? 'border-stone-400 bg-stone-50/70 shadow-sm dark:border-stone-500 dark:bg-stone-800' : 'border-stone-200 bg-white hover:border-stone-300 dark:border-stone-800 dark:bg-[#1C1C1E] dark:hover:border-stone-700'
                }`;
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'flex-1 overflow-hidden cursor-pointer pl-1';
                infoDiv.onclick = () => selectScore(score.id);
                
                infoDiv.innerHTML = `
                    <div class="classic-gothic font-bold text-sm truncate ${isCurrent ? 'text-stone-900 dark:text-white' : 'text-stone-800 dark:text-stone-200'}">${score.title}</div>
                    <div class="text-[10px] text-stone-500 dark:text-stone-400 font-bold tracking-wide mt-0.5">${score.pages.length} ページ</div>
                `;

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'flex items-center gap-1 ml-3';

                const editBtn = document.createElement('button');
                editBtn.className = 'p-1.5 text-stone-400 hover:text-stone-900 hover:bg-stone-100 dark:hover:text-white dark:hover:bg-stone-700 rounded transition-all';
                editBtn.innerHTML = '<i data-lucide="edit" class="w-4 h-4"></i>';
                editBtn.onclick = (e) => {
                    e.stopPropagation(); 
                    showPrompt('楽譜の名前を変更:', score.title, (newTitle) => {
                        score.title = newTitle;
                        saveScoreToDB(score).then(() => {
                            renderScoreModalList();
                            if (isCurrent) dom.headerTitle.textContent = score.title;
                            showToast("曲名を変更しました。");
                        });
                    });
                };

                const delBtn = document.createElement('button');
                delBtn.className = 'p-1.5 text-stone-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded transition-all';
                delBtn.innerHTML = '<i data-lucide="trash" class="w-4 h-4"></i>';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (state.scores.length <= 1) {
                        showToast("最後の楽譜は削除できません。");
                        return;
                    }
                    showConfirm("楽譜の削除", `「${score.title}」を完全に削除しますか？`, async () => {
                        try {
                            await deleteScoreFromDB(score.id);
                            state.scores = state.scores.filter(s => s.id !== score.id);
                            if (state.currentScoreId === score.id) {
                                state.currentScoreId = state.scores[0].id;
                                loadCurrentScoreToUI();
                            }
                            saveAppState();
                            renderScoreModalList();
                            showToast("楽譜を削除しました。");
                        } catch (err) {
                            showToast("削除に失敗しました。");
                        }
                    });
                };

                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(delBtn);
                
                item.appendChild(infoDiv);
                item.appendChild(actionsDiv);
                dom.modalScoreList.appendChild(item);
            });
            renderIcons();
        }

        // --- コントロールロジック ---
        function handlePageChange(targetPageIndex) {
            const score = getCurrentScore();
            if (!score) return;
            targetPageIndex = Math.min(Math.max(targetPageIndex, 0), score.pages.length - 1);
            
            if (state.mode === 'record' && state.isPlaying) {
                score.timeline = score.timeline.filter(e => e.time < state.currentTime - 50);
                score.timeline.push({ time: Math.floor(state.currentTime), page: targetPageIndex });
                saveScoreToDB(score);
                showToast(`${targetPageIndex + 1} ページへの移動を記録`);
            }

            state.currentPage = targetPageIndex;
            updateScorePosition();
            renderPagination();
            renderTimestampList();
        }

        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            
            if (state.isPlaying) {
                dom.iconPlay.classList.add('hidden');
                dom.iconPause.classList.remove('hidden');
                dom.btnPlay.className = 'w-11 h-11 flex items-center justify-center rounded-lg shadow-sm transition-all active:scale-95 bg-stone-700 dark:bg-stone-600';
                
                if (state.settings.wakeLock) requestWakeLock();
                
                state.lastFrameTime = performance.now();
                state.animationFrameId = requestAnimationFrame(loop);
                
                if (state.mode === 'record') renderTimestampList();
                resetImmersiveTimer();

            } else {
                dom.iconPlay.classList.remove('hidden');
                dom.iconPause.classList.add('hidden');
                dom.btnPlay.className = 'w-11 h-11 flex items-center justify-center rounded-lg shadow-sm transition-all active:scale-95 bg-stone-950 dark:bg-stone-200';
                
                cancelAnimationFrame(state.animationFrameId);
                if (state.mode === 'record') dom.btnStamp.disabled = true;
                exitImmersiveMode();
            }
        }

        function resetAll() {
            if (state.isPlaying) togglePlay();
            state.currentTime = 0;
            const score = getCurrentScore();
            state.currentPage = score && score.timeline.length > 0 ? score.timeline[0].page : 0;
            updateTimerDisplay();
            updateProgressBar();
            updateScorePosition();
            renderPagination();
            renderTimestampList();
            exitImmersiveMode();
        }

        function turnNextPage() {
            const score = getCurrentScore();
            if (!score) return;
            if (state.currentPage < score.pages.length - 1) {
                handlePageChange(state.currentPage + 1);
            }
        }

        function turnPrevPage() {
            if (state.currentPage > 0) {
                handlePageChange(state.currentPage - 1);
            }
        }

        function loop(timestamp) {
            if (!state.isPlaying) return;

            const delta = timestamp - state.lastFrameTime;
            state.currentTime += delta;
            state.lastFrameTime = timestamp;

            updateTimerDisplay();
            updateProgressBar();

            if (state.mode === 'play') checkAutoTurn();

            state.animationFrameId = requestAnimationFrame(loop);
        }

        function checkAutoTurn() {
            const score = getCurrentScore();
            if (!score || !score.timeline) return;

            let activeIndex = -1;
            let targetPage = 0;
            
            for (let i = 0; i < score.timeline.length; i++) {
                if (state.currentTime >= score.timeline[i].time) {
                    activeIndex = i;
                    targetPage = score.timeline[i].page;
                } else {
                    break;
                }
            }

            let needsRender = false;

            if (state.currentActiveEventIndex !== activeIndex) {
                state.currentActiveEventIndex = activeIndex;
                needsRender = true;
            }

            if (state.currentPage !== targetPage) {
                state.currentPage = targetPage;
                updateScorePosition();
                needsRender = true;
            }

            if (needsRender) {
                renderPagination();
                renderTimestampList();
            }
        }

        function recordStamp(e) {
            const score = getCurrentScore();
            if (!state.isPlaying || state.mode !== 'record') return;
            
            if (state.currentPage >= score.pages.length - 1) {
                showToast("最後のページです");
                return;
            }
            
            dom.stampIcon.style.transform = 'translateY(-4px)';
            setTimeout(() => dom.stampIcon.style.transform = 'translateY(0)', 150);

            handlePageChange(state.currentPage + 1);
        }

        function setMode(newMode) {
            if (state.isPlaying) togglePlay(); 
            state.mode = newMode;
            applyModeUI();
            saveAppState();
        }

        function applyModeUI() {
            dom.body.classList.remove('mode-play', 'mode-record');
            dom.body.classList.add(`mode-${state.mode}`);

            if (state.mode === 'play') {
                dom.modeIndicator.style.transform = 'translateX(0)';
                dom.btnModePlay.className = 'relative z-10 px-4 py-1.5 text-[10px] font-bold rounded w-16 transition-colors text-stone-900 dark:text-white';
                dom.btnModeRecord.className = 'relative z-10 px-4 py-1.5 text-[10px] font-bold rounded w-16 transition-colors text-stone-400 dark:text-stone-500';
                dom.modeLabel.textContent = '演奏モード';
            } else {
                dom.modeIndicator.style.transform = 'translateX(100%)';
                dom.btnModePlay.className = 'relative z-10 px-4 py-1.5 text-[10px] font-bold rounded w-16 transition-colors text-stone-400 dark:text-stone-500';
                dom.btnModeRecord.className = 'relative z-10 px-4 py-1.5 text-[10px] font-bold rounded w-16 transition-colors text-stone-900 dark:text-white';
                dom.modeLabel.textContent = '記録モード';
            }
            renderTimestampList();
        }

        function resetImmersiveTimer() {
            if (state.isImmersive) {
                dom.body.classList.remove('immersive-active');
                state.isImmersive = false;
            }
            clearTimeout(state.immersiveTimeout);
            
            if (state.mode === 'play' && state.isPlaying && state.settings.immersiveTimer > 0) {
                state.immersiveTimeout = setTimeout(() => {
                    dom.body.classList.add('immersive-active');
                    state.isImmersive = true;
                }, state.settings.immersiveTimer);
            }
        }

        function exitImmersiveMode() {
            clearTimeout(state.immersiveTimeout);
            dom.body.classList.remove('immersive-active');
            state.isImmersive = false;
        }

        // --- ファイル操作 (PDF / 画像) ---
        async function handleUploadedFiles(files) {
            if (files.length === 0) return;

            const pdfFiles = files.filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
            const imgFiles = files.filter(f => f.type.startsWith('image/'));

            if (pdfFiles.length > 0) {
                showLoading(true, "PDFを展開中...");
                const pdfFile = pdfFiles[0];
                const fileReader = new FileReader();

                fileReader.onload = async function() {
                    try {
                        const typedarray = new Uint8Array(this.result);
                        const loadingTask = pdfjsLib.getDocument({
                            data: typedarray,
                            cMapUrl: CMAP_URL,
                            cMapPacked: CMAP_PACKED,
                        });
                        const pdf = await loadingTask.promise;
                        const extractedPages = [];

                        const scale = Math.min(2, Math.max(1.5, window.devicePixelRatio || 1.5));

                        for (let i = 1; i <= pdf.numPages; i++) {
                            showLoading(true, `ページを生成中 (${i}/${pdf.numPages})`);
                            const page = await pdf.getPage(i);
                            const viewport = page.getViewport({ scale: scale });
                            
                            const canvas = document.createElement('canvas');
                            const context = canvas.getContext('2d');
                            canvas.height = viewport.height;
                            canvas.width = viewport.width;

                            await page.render({ canvasContext: context, viewport: viewport }).promise;
                            const jpegUrl = canvas.toDataURL('image/jpeg', 0.8);
                            extractedPages.push(jpegUrl);
                        }

                        const cleanTitle = pdfFile.name.replace(/\.[^/.]+$/, "");
                        const newScore = {
                            id: 'score_' + Date.now(),
                            title: cleanTitle,
                            pages: extractedPages,
                            timeline: [{ time: 0, page: 0 }]
                        };

                        state.scores.push(newScore);
                        state.currentScoreId = newScore.id;

                        await saveScoreToDB(newScore);
                        saveAppState();
                        closeModal();
                        loadCurrentScoreToUI();
                        showToast(`PDFから ${extractedPages.length} ページを読み込みました。`);
                    } catch (error) {
                        console.error("PDF Parsing Error:", error);
                        showToast("PDFの読み込みに失敗しました。");
                    } finally {
                        showLoading(false);
                    }
                };
                fileReader.readAsArrayBuffer(pdfFile);

            } else if (imgFiles.length > 0) {
                showLoading(true, "画像を最適化中...");
                imgFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));

                try {
                    const base64Images = await Promise.all(imgFiles.map(file => {
                        return new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onload = (e) => resolve(e.target.result);
                            reader.onerror = (err) => reject(err);
                            reader.readAsDataURL(file);
                        });
                    }));

                    const newScore = {
                        id: 'score_' + Date.now(),
                        title: '新しい楽譜 ' + (state.scores.length + 1),
                        pages: base64Images,
                        timeline: [{ time: 0, page: 0 }]
                    };

                    state.scores.push(newScore);
                    state.currentScoreId = newScore.id;

                    await saveScoreToDB(newScore);
                    saveAppState();
                    closeModal();
                    loadCurrentScoreToUI();
                    showToast(`${base64Images.length}枚の画像を読み込みました。`);
                } catch (err) {
                    console.error("Image Parse Error:", err);
                    showToast("画像の読み込みに失敗しました。");
                } finally {
                    showLoading(false);
                }
            }
        }

        dom.modalFileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            handleUploadedFiles(files);
            e.target.value = ''; 
        });

        dom.btnExportJson.addEventListener('click', () => {
            const score = getCurrentScore();
            if (!score) return;
            
            showLoading(true, "保存用データを構築中...");
            setTimeout(() => {
                try {
                    const dataStr = JSON.stringify(score);
                    const blob = new Blob([dataStr], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${score.title.replace(/\s+/g, '_')}_Legato.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast("JSONデータを出力しました。");
                } catch (e) {
                    showToast("データが大きすぎるため出力に失敗しました。");
                } finally {
                    showLoading(false);
                }
            }, 100);
        });

        dom.importJsonInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            showLoading(true, "データを展開中...");
            const reader = new FileReader();
            reader.onload = async function(event) {
                try {
                    const imported = JSON.parse(event.target.result);
                    
                    if (imported.pages && (imported.timeline || imported.timestamps) && Array.isArray(imported.pages)) {
                        imported.id = 'score_' + Date.now();
                        if(!imported.title) imported.title = 'インポートした楽譜';
                        
                        migrateToTimeline(imported);
                        state.scores.push(imported);
                        state.currentScoreId = imported.id;
                        
                        await saveScoreToDB(imported);
                        saveAppState();
                        closeModal();
                        loadCurrentScoreToUI();
                        showToast("JSONデータをインポートしました。");
                    } else {
                        showToast("非対応のファイル形式です。");
                    }
                } catch(err) {
                    showToast("JSONの読込に失敗しました。");
                } finally {
                    showLoading(false);
                }
            };
            reader.readAsText(file);
            e.target.value = ''; 
        });

        // --- 10. イベントリスナーとジェスチャー ---
        dom.btnPlay.addEventListener('click', togglePlay);
        dom.btnReset.addEventListener('click', resetAll);
        dom.btnModePlay.addEventListener('click', () => setMode('play'));
        dom.btnModeRecord.addEventListener('click', () => setMode('record'));
        
        dom.btnOpenModal.addEventListener('click', openModal);
        dom.btnCloseModal.addEventListener('click', closeModal);
        dom.scoreModal.addEventListener('click', (e) => {
            if (e.target === dom.scoreModal) closeModal();
        });

        dom.btnOpenSettings.addEventListener('click', openSettings);
        dom.btnCloseSettings.addEventListener('click', closeSettings);
        dom.settingsModal.addEventListener('click', (e) => {
            if (e.target === dom.settingsModal) closeSettings();
        });

        dom.btnStamp.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            recordStamp(e);
        }, { passive: false });
        dom.btnStamp.addEventListener('mousedown', (e) => {
            recordStamp(e);
        });

        // ピンチアウトによる無段階ズーム ＆ スワイプ処理
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;
        let isPinching = false;
        let initialPinchDist = 0;
        let initialZoomScale = 1.0;
        
        dom.scoreContainer.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                isPinching = true;
                initialPinchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialZoomScale = state.zoomScale;
                dom.body.classList.add('is-pinching'); 
            } else if (e.touches.length === 1) {
                isPinching = false;
                touchStartX = e.touches[0].screenX;
                touchStartY = e.touches[0].screenY;
            }
        }, { passive: false });

        dom.scoreContainer.addEventListener('touchmove', e => {
            if (isPinching && e.touches.length === 2) {
                e.preventDefault(); 
                const currentDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const scaleChange = currentDist / initialPinchDist;
                let newZoom = initialZoomScale * scaleChange;
                newZoom = Math.max(ZOOM_MIN, Math.min(newZoom, ZOOM_MAX));
                state.zoomScale = newZoom;
                applyZoom();
            }
        }, { passive: false });

        dom.scoreContainer.addEventListener('touchend', e => {
            if (isPinching) {
                if (e.touches.length < 2) {
                    isPinching = false;
                    dom.body.classList.remove('is-pinching');
                    saveAppState();
                }
                return;
            }
            if (e.changedTouches.length === 1) {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                handleSwipeOrTap(e);
            }
        }, { passive: true });

        dom.scoreContainer.addEventListener('click', e => {
            if (e.pointerType === 'mouse') {
                if (state.isImmersive) {
                    resetImmersiveTimer();
                    return;
                }
                const width = window.innerWidth;
                if (e.clientX > width / 2) turnNextPage();
                else turnPrevPage();
            }
        });

        function handleSwipeOrTap(e) {
            if (state.isImmersive) {
                resetImmersiveTimer();
                return;
            }
            const dx = touchStartX - touchEndX;
            const dy = touchStartY - touchEndY;
            
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
                if (dx > 0) turnNextPage(); 
                else turnPrevPage();        
            } 
            else if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
                const width = window.innerWidth;
                if (e.changedTouches[0].clientX > width / 2) turnNextPage();
                else turnPrevPage();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!dom.scoreModal.classList.contains('opacity-0') || 
                !dom.settingsModal.classList.contains('opacity-0') ||
                document.activeElement.tagName === 'INPUT') return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'ArrowRight' || e.code === 'ArrowDown' || e.code === 'PageDown') {
                e.preventDefault();
                if (state.mode === 'record' && state.isPlaying) {
                    recordStamp(e);
                } else {
                    turnNextPage();
                }
            } else if (e.code === 'ArrowLeft' || e.code === 'ArrowUp' || e.code === 'PageUp') {
                e.preventDefault();
                turnPrevPage();
            }
        });

        const uiEvents = ['touchstart', 'touchmove', 'mousedown', 'mousemove', 'click', 'keydown'];
        uiEvents.forEach(evt => {
            document.addEventListener(evt, resetImmersiveTimer, { passive: true });
        });

        // --- 11. アプリ起動とスプラッシュフェードアウト ---
        loadData();

        window.addEventListener('load', () => {
            renderIcons(); 
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.classList.add('fade-out');
                    setTimeout(() => {
                        splash.remove();
                    }, 1000); 
                }
            }, 2400); 
        });

    </script>
</body>
</html>
